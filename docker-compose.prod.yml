version: "3.9"

# QuickHire — Production Docker Compose
# AWS EC2 / any Linux host
#
# Before starting:
#   1. Copy backend/.env.example → backend/.env and fill all values
#   2. Copy frontend/.env.example → frontend/.env and fill all values
#   3. docker compose -f docker-compose.prod.yml up -d --build

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-quickhire}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    # NOT exposed externally — backend connects via internal docker network

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./Backend/backend/.env
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-quickhire}:${MONGO_ROOT_PASS}@mongo:27017
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID:-}
    restart: unless-stopped
    env_file: ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # put SSL certs here
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
  redis_data:
